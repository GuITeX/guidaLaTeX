<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="100%" height="100%">
  <defs>
    <style>
      .window-title { font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #333333; }
      .menu-text { font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #1a1a1a; }
      .statusbar-text { font-family: 'Segoe UI', sans-serif; font-size: 13px; fill: #444444; }
      
      /* Sintassi LaTeX (Colori TeXworks) */
      .code-font { font-family: 'Consolas', 'Courier New', monospace; font-size: 16px; font-weight: bold; }
      .tex-comment { fill: #808080; font-weight: normal; }
      .tex-command { fill: #0000ff; }
      .tex-bracket { fill: #ff0000; }
      .tex-env { fill: #808000; }
      .tex-text { fill: #000000; font-weight: normal; }
    </style>
    
    <g id="play-button">
      <circle cx="20" cy="20" r="18" fill="#f8f9fa" stroke="#ced4da" stroke-width="1"/>
      <polygon points="14,11 28,20 14,29" fill="#4caf50"/>
    </g>
  </defs>

  <rect width="800" height="440" rx="8" fill="#ffffff" stroke="#ababab" stroke-width="1"/>
  
  <path d="M 8,0 H 792 A 8,8 0 0 1 800,8 V 40 H 0 V 8 A 8,8 0 0 1 8,0 Z" fill="#f3f3f3"/>
  <text x="45" y="25" class="window-title">primodocumento.tex - TeXworks</text>
  
  <rect x="15" y="13" width="16" height="16" rx="3" fill="#3a5a9f"/>
  <text x="19" y="26" font-family="Georgia" font-size="12" fill="#ffffff" font-weight="bold">T</text>

  <g transform="translate(680, 0)">
    <line x1="10" y1="20" x2="22" y2="20" stroke="#000000" stroke-width="1"/>
    <rect x="42" y="14" width="12" height="12" fill="none" stroke="#000000" stroke-width="1"/>
    <line x1="76" y1="14" x2="88" y2="26" stroke="#000000" stroke-width="1"/>
    <line x1="88" y1="14" x2="76" y2="26" stroke="#000000" stroke-width="1"/>
  </g>

  <g transform="translate(0, 40)">
    <rect width="800" height="30" fill="#ffffff"/>
    <text x="20" y="20" class="menu-text">File</text>
    <text x="70" y="20" class="menu-text">Modifica</text>
    <text x="155" y="20" class="menu-text">Cerca</text>
    <text x="215" y="20" class="menu-text">Formato</text>
    <text x="295" y="20" class="menu-text">Composizione</text>
    <text x="415" y="20" class="menu-text">Script</text>
    <text x="480" y="20" class="menu-text">Finestra</text>
    <text x="555" y="20" class="menu-text" fill="#ababab">Aiuto</text>
    <line x1="0" y1="30" x2="800" y2="30" stroke="#eaeaea" stroke-width="1"/>
  </g>

  <g transform="translate(0, 70)">
    <rect width="800" height="45" fill="#f9f9f9"/>
    
    <use href="#play-button" x="15" y="4"/>
    
    <g transform="translate(60, 8)">
      <rect width="160" height="28" rx="4" fill="#ffffff" stroke="#cccccc"/>
      <text x="15" y="19" font-family="'Segoe UI', sans-serif" font-size="14">LuaLaTeX</text>
      <polygon points="135,11 140,17 145,11" fill="#333333"/>
    </g>
    
    <line x1="235" y1="8" x2="235" y2="36" stroke="#dcdcdc" stroke-width="1"/>
    
    <g transform="translate(250, 10)" stroke="#707070" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="2" width="14" height="18" rx="1"/>
      <path d="M 25,20 V 6 L 33,2 H 43 V 20 Z" fill="#b0c4de" stroke="#5577a8"/>
      <path d="M 55,4 L 63,12 H 73 V 22 H 55 Z"/>
      <path d="M 98,16 C 98,10 106,10 110,14 M 98,16 H 104 M 98,16 V 10" stroke="#ababab"/>
      <path d="M 132,16 C 132,10 124,10 120,14 M 132,16 H 126 M 132,16 V 10" stroke="#ababab"/>
      <circle cx="146" cy="16" r="3"/><circle cx="146" cy="8" r="3"/>
      <line x1="149" y1="14" x2="160" y2="6"/><line x1="149" y1="10" x2="160" y2="18"/>
      <rect x="175" y="4" width="12" height="14"/>
      <rect x="195" y="4" width="12" height="14" fill="#ebebeb"/>
    </g>
    
    <line x1="0" y1="45" x2="800" y2="45" stroke="#e0e0e0" stroke-width="1"/>
  </g>

  <g transform="translate(0, 115)">
    <rect width="800" height="285" fill="#ffffff"/>

    <g transform="translate(15, 0)" class="code-font">
      <text y="20" class="tex-comment">% !TeX program = lualatex</text>
      
      <text y="70">
        <tspan class="tex-command">\documentclass</tspan><tspan class="tex-bracket">{</tspan><tspan class="tex-text">article</tspan><tspan class="tex-bracket">}</tspan>
      </text>
      
      <text y="95">
        <tspan class="tex-command">\begin</tspan><tspan class="tex-bracket">{</tspan><tspan class="tex-env">document</tspan><tspan class="tex-bracket">}</tspan>
      </text>
      
      <text y="120" class="tex-text">Ciao mondo!</text>
      
      <text y="145">
        <tspan class="tex-command">\end</tspan><tspan class="tex-bracket">{</tspan><tspan class="tex-env">document</tspan><tspan class="tex-bracket">}</tspan>
      </text>
    </g>
  </g>

  <g transform="translate(0, 400)">
    <rect width="800" height="40" fill="#f3f3f3"/>
    <line x1="0" y1="0" x2="800" y2="0" stroke="#dcdcdc" stroke-width="1"/>
    
    <text x="15" y="25" class="statusbar-text">File &quot;primodocumento.tex&quot; caricato</text>
    
    <g transform="translate(560, 10)">
      <rect x="0" y="0" width="50" height="22" rx="3" fill="#ffffff" stroke="#d0d0d0"/>
      <text x="11" y="16" font-family="'Segoe UI', sans-serif" font-size="12" fill="#333333">CRLF</text>
      
      <rect x="58" y="0" width="60" height="22" rx="3" fill="#ffffff" stroke="#d0d0d0"/>
      <text x="69" y="16" font-family="'Segoe UI', sans-serif" font-size="12" fill="#333333">UTF-8</text>
      
      <rect x="126" y="0" width="100" height="22" rx="3" fill="#ffffff" stroke="#d0d0d0"/>
      <text x="133" y="16" font-family="'Segoe UI', sans-serif" font-size="12" fill="#333333">Linea 2 di 6 ; col 0</text>
    </g>
  </g>
</svg>
