name: Deploy guidaLaTeX

# Il workflow si attiva a ogni push sul branch "master"
on:
  push:
    branches:
      - master

jobs:
  web-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Scarica il codice del tuo repository nell'ambiente virtuale
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      # 2. Installa mdBook e compila il book
      - name: Installa mdBook
        run: |
          MDBOOK_VERSION="v0.5.3"
          mkdir -p bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz | tar -xz --directory=bin
          bin/mdbook build

      # 3. Sincronizza la cartella tramite FTP
      - name: 🚀 FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # 📁 directory locale da caricare
          local-dir: ./guidalatex/
          # 🌍 cartella di destinazione sul server
          server-dir: /httpdocs/guide/guidalatex/
