<svg xmlns="http://www.w3.org/2000/svg" width="600" height="550" viewBox="0 0 600 550">
  <style>
    .win-text { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; font-size: 15px; fill: #1a1a1a; }
    .win-text-disabled { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; font-size: 15px; fill: #a0a0a0; }
    .title-text { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; font-size: 12px; fill: #1a1a1a; }
    .menu-text { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; font-size: 14px; fill: #1a1a1a; }
    .header-main { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; font-size: 24px; font-weight: bold; fill: #000000; }
    .header-sub { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; font-size: 14px; fill: #333333; }
    .btn-text { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; font-size: 14px; fill: #1a1a1a; text-anchor: middle; }
  </style>

  <defs>
    <filter id="window-shadow" x="-5%" y="-5%" width="110%" height="113%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.15"/>
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <g filter="url(#window-shadow)">
    <rect x="15" y="15" width="570" height="520" rx="8" fill="#f3f3f3" stroke="#d5d5d5" stroke-width="1"/>
    
    <circle cx="33" cy="32" r="8" fill="#d2b48c"/>
    <circle cx="31" cy="30" r="2" fill="#333"/>
    <text x="48" y="36" class="title-text">Installazione di TeX Live</text>
    
    <line x1="486" y1="35" x2="496" y2="35" stroke="#000000" stroke-width="1"/>
    <rect x="523" y="29" width="10" height="10" fill="none" stroke="#000000" stroke-width="1"/>
    <path d="M 559 29 L 569 39 M 569 29 L 559 39" stroke="#000000" stroke-width="1"/>

    <text x="30" y="68" class="menu-text">Interrompi</text>
    <text x="120" y="68" class="menu-text">Lingua della GUI</text>
    <text x="250" y="68" class="menu-text">Scalatura font</text>
    <line x1="16" y1="80" x2="584" y2="80" stroke="#e5e5e5" stroke-width="1"/>

    <text x="300" y="125" class="header-main" text-anchor="middle">Installazione di TeX Live 2026</text>
    <text x="300" y="152" class="header-sub" text-anchor="middle">r. 79222</text>
    <line x1="40" y1="168" x2="560" y2="168" stroke="#d0d0d0" stroke-width="1"/>

    <text x="30" y="200" class="win-text">Posizione dell'installazione</text>
    <text x="290" y="200" class="win-text">C:/texlive/2026</text>
    <rect x="450" y="182" width="115" height="28" rx="4" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
    <text x="5075" y="201" class="btn-text" transform="translate(-4568, 0)">Cambia</text>

    <text x="30" y="245" class="win-text">Spazio richiesto su disco (in MB):</text>
    <text x="290" y="245" class="win-text">10021</text>

    <text x="30" y="285" class="win-text">Disk space available (in MB):</text>
    <text x="290" y="285" class="win-text">319751</text>

    <text x="30" y="330" class="win-text">Formato pagina predefinito</text>
    <rect x="450" y="312" width="115" height="28" rx="4" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
    <text x="462" y="331" class="win-text">A4</text>
    <path d="M 544 323 L 549 328 L 554 323" fill="none" stroke="#666666" stroke-width="1.5"/>

    <text x="30" y="380" class="win-text-disabled">Installazione per tutti gli utenti</text>
    <rect x="541" y="366" width="16" height="16" rx="3" fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>

    <text x="30" y="425" class="win-text">Installa il programma TeXworks</text>
    <rect x="541" y="411" width="16" height="16" rx="3" fill="#005a9e" stroke="#005a9e" stroke-width="1"/>
    <path d="M 545 419 L 548 422 L 553 416" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <line x1="16" y1="465" x2="584" y2="465" stroke="#d0d0d0" stroke-width="1"/>

    <rect x="30" y="480" width="115" height="32" rx="4" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
    <text x="87" y="501" class="btn-text">Avanzate</text>

    <rect x="325" y="480" width="115" height="32" rx="4" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
    <text x="382" y="501" class="btn-text">Esci</text>

    <rect x="455" y="480" width="115" height="32" rx="4" fill="#ffffff" stroke="#0067b8" stroke-width="2"/>
    <text x="512" y="501" class="btn-text" font-weight="600">Installa</text>
  </g>
</svg>
