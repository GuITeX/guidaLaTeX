<svg xmlns="http://www.w3.org/2000/svg" width="600" height="422" viewBox="0 0 600 422">
  <style>
    .win-text { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; font-size: 14px; fill: #1a1a1a; }
    .title-text { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; font-size: 12px; fill: #1a1a1a; }
    .footer-text { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; font-size: 12px; fill: #8a8a8a; }
    .btn-text { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; font-size: 13px; fill: #1a1a1a; font-weight: 400; }
    .btn-primary-text { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; font-size: 13px; fill: #000000; font-weight: 400; }
  </style>

  <defs>
    <filter id="window-shadow" x="-5%" y="-5%" width="110%" height="113%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.15"/>
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <g filter="url(#window-shadow)">
    <rect x="15" y="15" width="570" height="392" rx="8" fill="#f3f3f3" stroke="#d5d5d5" stroke-width="1"/>
    
    <g transform="translate(25, 24)">
      <rect x="0" y="0" width="16" height="16" rx="2" fill="#333333"/>
      <text x="3" y="12" font-family="monospace" font-size="10" fill="#ffffff" font-weight="bold">T</text>
    </g>
    <text x="48" y="36" class="title-text">TeX Live installer</text>
    
    <line x1="486" y1="35" x2="496" y2="35" stroke="#000000" stroke-width="1"/>
    <rect x="523" y="29" width="10" height="10" fill="none" stroke="#000000" stroke-width="1"/>
    <path d="M 559 29 L 569 39 M 569 29 L 559 39" stroke="#000000" stroke-width="1"/>

    <text x="30" y="76" class="win-text">Only single-user install possible.</text>
    <text x="30" y="96" class="win-text">For an all-users installation, abort now and re-run as administrator.</text>

    <circle cx="38" cy="180" r="8" fill="#ffffff" stroke="#005a9e" stroke-width="2"/>
    <circle cx="38" cy="180" r="4" fill="#005a9e"/>
    <text x="54" y="185" class="win-text">Install</text>

    <circle cx="38" cy="250" r="8" fill="#ffffff" stroke="#7a7a7a" stroke-width="1.5"/>
    <text x="54" y="255" class="win-text">Unpack only</text>

    <line x1="16" y1="350" x2="584" y2="350" stroke="#d0d0d0" stroke-width="1"/>

    <text x="140" y="377" class="footer-text">Nullsoft Install System v2.46</text>

    <rect x="30" y="360" width="100" height="28" rx="4" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
    <text x="80" y="378" class="btn-text" text-anchor="middle">Cancel</text>

    <rect x="470" y="360" width="100" height="28" rx="4" fill="#ffffff" stroke="#0067b8" stroke-width="2"/>
    <text x="520" y="378" class="btn-primary-text" text-anchor="middle">Next ></text>
  </g>
</svg>
