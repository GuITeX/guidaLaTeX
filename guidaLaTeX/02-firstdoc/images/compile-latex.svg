<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 20 700 240" width="100%" height="100%">
  <style>
    .label { font-family: 'Segoe UI', system-ui, sans-serif; font-weight: bold; font-size: 14px; fill: #2d3748; text-anchor: middle; }
    .ext { font-family: 'Segoe UI', system-ui, sans-serif; font-weight: bold; font-size: 12px; fill: #ffffff; text-anchor: middle; }
    .code { font-family: 'Consolas', 'Courier New', monospace; font-size: 11px; fill: #4a5568; }
    .engine-text { font-family: 'Georgia', serif; font-weight: bold; font-size: 16px; fill: #ffffff; text-anchor: middle; }
    .arrow { fill: none; stroke: #4a5568; stroke-width: 3; stroke-dasharray: 6; animation: dash 2s linear infinite; stroke-linecap: round; }
  </style>

  <rect width="800" height="300" rx="15" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>

  <g transform="translate(50, 50)">
    <rect x="2" y="2" width="175" height="170" rx="8" fill="#cbd5e0" opacity="0.5"/>
    <rect x="0" y="0" width="175" height="170" rx="8" fill="#ffffff" stroke="#cbd5e0" stroke-width="2"/>
    <rect x="0" y="0" width="175" height="30" rx="6" fill="#3182ce"/>
    <rect x="0" y="20" width="175" height="10" fill="#3182ce"/> <text x="65" y="20" class="ext">File sorgente (.tex)</text>
    
    <text x="15" y="60" class="code" fill="#3182ce">\documentclass{article}</text>
    <text x="15" y="80" class="code">\begin{document}</text>
    <text x="15" y="100" class="code" font-weight="bold" fill="#2d3748">Ciao mondo!</text>
    <text x="15" y="120" class="code">\end{document}</text>
  </g>

  <g>
    <path d="M 230 135 L 310 135" class="arrow" />
    <polygon points="310,130 325,135 310,140" fill="#4a5568"/>
  </g>

  <g transform="translate(320, 75)">
    <circle cx="60" cy="60" r="55" fill="#2d3748" stroke="#1a202c" stroke-width="2"/>
    <circle cx="60" cy="60" r="45" fill="#4a5568"/>
    
    <text x="60" y="65" class="engine-text">
      L<tspan dy="-4" font-size="12">A</tspan><tspan dy="4">T</tspan><tspan dy="4" font-size="12">E</tspan><tspan dy="-4">X</tspan>
    </text>
    
    <text x="60" y="135" class="label">Compilazione</text>
  </g>

  <g>
    <path d="M 440 135 L 525 135" class="arrow" />
    <polygon points="525,130 540,135 525,140" fill="#4a5568"/>
  </g>

  <g transform="translate(540, 50)">
    <rect x="2" y="2" width="130" height="170" rx="8" fill="#cbd5e0" opacity="0.5"/>
    <rect x="0" y="0" width="130" height="170" rx="8" fill="#ffffff" stroke="#cbd5e0" stroke-width="2"/>
    <rect x="0" y="0" width="130" height="30" rx="6" fill="#3182ce"/>
    <rect x="0" y="20" width="130" height="10" fill="#3182ce"/> <text x="65" y="20" class="ext">Output (.PDF)</text>
    
    <rect x="15" y="55" width="100" height="8" rx="2" fill="#edf2f7"/>
    <rect x="15" y="70" width="100" height="8" rx="2" fill="#edf2f7"/>
    <rect x="15" y="85" width="60" height="8" rx="2" fill="#edf2f7"/>
    
    <rect x="15" y="105" width="40" height="40" rx="4" fill="#feebc8" stroke="#f6ad55" stroke-width="1"/>
    <circle cx="35" cy="120" r="6" fill="#f6ad55"/>
    
    <rect x="65" y="110" width="50" height="6" rx="2" fill="#edf2f7"/>
    <rect x="65" y="122" width="50" height="6" rx="2" fill="#edf2f7"/>
    <rect x="65" y="134" width="35" height="6" rx="2" fill="#edf2f7"/>
  </g>
</svg>
